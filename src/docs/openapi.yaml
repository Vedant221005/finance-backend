tags:
  - name: Auth
  - name: Users
  - name: Transactions
  - name: Dashboard

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        details:
          nullable: true

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, ANALYST, VIEWER]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthPayload:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        token:
          type: string
        expiresIn:
          type: string
          example: 1h

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          format: password
          example: Password@123

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@finance.local
        password:
          type: string
          format: password
          example: Admin@123

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, ANALYST, VIEWER]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Users fetched successfully
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 10
            total:
              type: integer
              example: 3
            totalPages:
              type: integer
              example: 1

    Transaction:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
          format: float
        type:
          type: string
          enum: [INCOME, EXPENSE]
        category:
          type: string
        date:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
        isDeleted:
          type: boolean
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        userId:
          type: string

    CreateTransactionRequest:
      type: object
      required: [amount, type, category, date]
      properties:
        amount:
          type: number
          format: float
          example: 1500
        type:
          type: string
          enum: [INCOME, EXPENSE]
        category:
          type: string
          example: Salary
        date:
          type: string
          format: date-time
          example: 2026-04-01T10:00:00.000Z
        notes:
          type: string
          example: Monthly salary

    UpdateTransactionRequest:
      type: object
      properties:
        amount:
          type: number
          format: float
        type:
          type: string
          enum: [INCOME, EXPENSE]
        category:
          type: string
        date:
          type: string
          format: date-time
        notes:
          type: string

    Totals:
      type: object
      properties:
        totalIncome:
          type: number
          format: float
        totalExpenses:
          type: number
          format: float
        netBalance:
          type: number
          format: float

    CategoryBreakdownItem:
      type: object
      properties:
        category:
          type: string
        type:
          type: string
          enum: [INCOME, EXPENSE]
        _sum:
          type: object
          properties:
            amount:
              type: number
              format: float
              nullable: true

    MonthlyTrendItem:
      type: object
      properties:
        month:
          type: string
          example: 2026-04
        income:
          type: number
          format: float
        expense:
          type: number
          format: float

    WeeklySummaryItem:
      type: object
      properties:
        day:
          type: string
          example: 2026-04-03
        income:
          type: number
          format: float
        expense:
          type: number
          format: float

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/AuthPayload'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/AuthPayload'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users:
    get:
      tags: [Users]
      summary: Get all users (ADMIN)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID (ADMIN)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'

    delete:
      tags: [Users]
      summary: Delete user (ADMIN)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/users/{id}/role:
    patch:
      tags: [Users]
      summary: Update user role (ADMIN)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [ADMIN, ANALYST, VIEWER]
      responses:
        '200':
          description: Role updated

  /api/users/{id}/active:
    patch:
      tags: [Users]
      summary: Activate or deactivate user (ADMIN)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive:
                  type: boolean
      responses:
        '200':
          description: Status updated

  /api/transactions:
    get:
      tags: [Transactions]
      summary: List transactions with filtering and pagination
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: type
          schema:
            type: string
            enum: [INCOME, EXPENSE]
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [date, amount, category, type, createdAt]
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Transactions fetched

    post:
      tags: [Transactions]
      summary: Create transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Transaction'

  /api/transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get transaction by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction fetched

    patch:
      tags: [Transactions]
      summary: Update transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequest'
      responses:
        '200':
          description: Transaction updated

    delete:
      tags: [Transactions]
      summary: Soft delete transaction
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction soft deleted

  /api/dashboard/overview:
    get:
      tags: [Dashboard]
      summary: Get full dashboard overview
      responses:
        '200':
          description: Overview fetched

  /api/dashboard/totals:
    get:
      tags: [Dashboard]
      summary: Get totals (income, expenses, net balance)
      responses:
        '200':
          description: Totals fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Totals'

  /api/dashboard/category-breakdown:
    get:
      tags: [Dashboard]
      summary: Get category-wise breakdown
      responses:
        '200':
          description: Category breakdown fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CategoryBreakdownItem'

  /api/dashboard/monthly-trends:
    get:
      tags: [Dashboard]
      summary: Get monthly income/expense trends
      responses:
        '200':
          description: Monthly trends fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MonthlyTrendItem'

  /api/dashboard/weekly-summary:
    get:
      tags: [Dashboard]
      summary: Get weekly income/expense summary
      responses:
        '200':
          description: Weekly summary fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WeeklySummaryItem'

  /api/dashboard/recent-transactions:
    get:
      tags: [Dashboard]
      summary: Get recent transactions
      responses:
        '200':
          description: Recent transactions fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
